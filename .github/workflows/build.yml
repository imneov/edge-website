name: Build

on:
  push:
    branches:
      - main
      - 'release-*'
    tags: ['v*']
  schedule:
    - cron: '30 19 * * *'  # Daily build at 7:30 PM UTC (3:30 AM Beijing Time)
  workflow_dispatch:

env:
  REGISTRY: quanzhenglong.com
  REPO: edge
  DOCKER_USERNAME: edge_admin

jobs:
  build:
    name: Build and Push
    runs-on: self-hosted
    if: github.event.pull_request.merged == true || github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine build platforms
        id: platforms
        run: |
          # Build strategy:
          # - Tag releases: always multi-arch (amd64 + arm64)
          # - Manual triggers (workflow_dispatch): multi-arch for testing
          # - Scheduled builds: multi-arch for nightly releases
          # - Push to main: amd64 only for fast feedback
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "📦 Building multi-arch for release/nightly"
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            echo "⚡ Building amd64 only for fast feedback"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/website
          tags: |
            type=schedule,pattern=nightly-{{date 'YYYYMMDD' tz='Asia/Shanghai'}}
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/release-') }}
            type=raw,value=main,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Generate image for deployment
        id: release-image
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/website
          tags: |
            type=raw,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/main') }}
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docs
          file: ./docs/Dockerfile.prod
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "Built and pushed: ${{ steps.meta.outputs.tags }}"

      - name: Setup SSH
        if: ${{ startsWith(github.ref, 'refs/heads/main') && github.event_name != 'schedule' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NEW_TESTING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.NEW_TESTING_HOST }} >> ~/.ssh/known_hosts
          
      - name: Update deployment image (new-testing)
        if: ${{ startsWith(github.ref, 'refs/heads/main') && github.event_name != 'schedule' }}
        run: |
          ssh -t -o StrictHostKeyChecking=no root@${{ secrets.NEW_TESTING_HOST }} << 'EOF'
            set -e
            echo "====== 开始更新镜像 ======"
            kubectl -n edge-system set image deployment/website website=${{ steps.release-image.outputs.tags }}
            kubectl -n edge-system rollout status deployment/website
            echo "====== 镜像更新完成 ======"
          EOF
